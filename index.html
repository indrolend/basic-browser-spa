<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homedev SPA</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #111; color: #f0f0f0; margin: 0; font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace; }
    #spa-root { min-height: 80vh; display: flex; align-items: center; justify-content: center; }
    .spa-hero { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 320px; min-height: 320px; }
    .spa-hero-image { max-width: 80vw; max-height: 60vh; border-radius: 16px; box-shadow: 0 4px 32px #000a; background: #222; }
    .spa-hero-text { font-size: 2.5rem; color: #5ee87d; text-transform: uppercase; letter-spacing: 0.1em; margin: 1.5rem 0; text-align: center; }
    .spa-nav-btn { background: #222; color: #5ee87d; border: none; border-radius: 8px; padding: 0.75em 1.5em; margin: 0.5em; font-size: 1.1rem; cursor: pointer; transition: background 0.2s; }
    .spa-nav-btn:active, .spa-nav-btn:focus { background: #333; outline: none; }
  </style>
</head>
<body>
  <div id="spa-root">
    <div id="spa-hero-container"></div>
  </div>
  <div id="spa-item-nav"></div>
  <!-- transition-canvas removed: all transitions now occur on the hero canvas itself -->
  <script type="module" src="main.js"></script>
</body>
</html>
